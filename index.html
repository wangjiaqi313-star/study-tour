                { title: "磁器口：码头旧事", cat: "历史/民俗", s1: "嘉陵江航运与巴渝民俗文化。", kn: "核心：码头地理对重庆语言、饮食的底层塑造。", s2: "脚本：手绘古镇地图，寻找老码头的历史坐标。", hm: "作业：整理五个源于码头文化的本地方言词。", s3: "分镜：手绘漫画风格与实景拍摄的无缝切换。", p: 55, img: "https://images.unsplash.com/photo-1528699633336-3b0439f17d2c?w=800" },

        };

        // 初始化动画
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
            }, 1800);
            render('science');
        };

        function switchTab(type) {
            document.getElementById('t-sci').className = type === 'science' ? 'flex-1 py-4 tab-active' : 'flex-1 py-4 text-slate-400';
            document.getElementById('t-art').className = type === 'arts' ? 'flex-1 py-4 tab-active' : 'flex-1 py-4 text-slate-400';
            render(type);
        }

        function render(type) {
            const list = document.getElementById('main-list');
            list.innerHTML = data[type].map((item, idx) => `
                <div onclick="openModal('${type}', ${idx})" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 active:scale-95 transition-all">
                    <img src="${item.img}" class="w-14 h-14 rounded-2xl object-cover shadow-inner">
                    <div class="flex-1">
                        <span class="text-[8px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded tracking-tighter uppercase">${item.cat}</span>
                        <h3 class="text-sm font-black text-slate-800 mt-0.5">${item.title}</h3>
                        <div class="mt-2 w-full bg-slate-50 h-1 rounded-full overflow-hidden">
                            <div class="bg-blue-600 h-full" style="width: ${item.p}%"></div>
                        </div>
                    </div>
                    <svg class="w-4 h-4 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </div>
            `).join('');
        }

        function openModal(type, idx) {
            const item = data[type][idx];
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-s1').innerText = item.s1;
            document.getElementById('m-kn').innerText = item.kn;
            document.getElementById('m-s2').innerText = item.s2;
            document.getElementById('m-hm').innerText = `学生作业：${item.hm}`;
            document.getElementById('m-s3').innerText = item.s3;
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-p-val').innerText = `${item.p}%`;
            document.getElementById('m-p-bar').style.width = `${item.p}%`;

            const m = document.getElementById('modal');
            const c = document.getElementById('modal-content');
            m.classList.remove('hidden');
            setTimeout(() => c.classList.remove('translate-y-full'), 50);
        }

        function closeModal() {
            const c = document.getElementById('modal-content');
            c.classList.add('translate-y-full');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 400);
        }
    </script>
</body>
</html>
